<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>移动端图像直方图分析系统 - Baseline</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell app-shell--baseline">
    <header class="topbar">
      <div class="brand-lockup">
        <div class="app-mark app-mark--baseline" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div>
          <p class="eyebrow">Baseline Canvas Lab</p>
          <h1>移动端图像直方图分析系统</h1>
        </div>
      </div>
      <div class="top-actions">
        <span class="mode-chip mode-chip--baseline">优化前</span>
        <label class="choose-button" for="imageInput">
          <span class="choose-icon" aria-hidden="true"></span>
          <span>选择图片</span>
        </label>
      </div>
      <input id="imageInput" type="file" accept="image/*">
    </header>

    <section class="insight-strip" aria-label="应用能力概览">
      <div>
        <span>运行环境</span>
        <strong>离线 WebView</strong>
      </div>
      <div>
        <span>输出规格</span>
        <strong>256 x 100</strong>
      </div>
      <div>
        <span>对照模式</span>
        <strong>Baseline</strong>
      </div>
    </section>

    <section class="workspace" aria-label="图像直方图分析工作区">
      <div class="preview-pane">
        <div class="pane-header">
          <div>
            <p class="section-kicker">Input</p>
            <h2>原图预览</h2>
          </div>
          <span id="imageMeta">未选择图片</span>
        </div>
        <div class="preview-stage">
          <img id="previewImage" alt="已选择图片预览">
          <div id="previewPlaceholder" class="empty-state">
            <span class="empty-icon" aria-hidden="true"></span>
            <p>选择一张本地图片后显示预览</p>
          </div>
        </div>
      </div>

      <div class="result-pane">
        <div class="pane-header">
          <div>
            <p class="section-kicker">Result</p>
            <h2>灰度直方图</h2>
          </div>
          <span id="elapsedText">Baseline 耗时 -- ms</span>
        </div>
        <div id="processingPanel" class="processing-panel" hidden>
          <div class="processing-copy">
            <span id="processingLabel">正在处理</span>
            <strong>生成中</strong>
          </div>
          <div class="progress-track" aria-hidden="true">
            <span id="progressBar"></span>
          </div>
        </div>
        <div class="histogram-stage">
          <canvas id="histogramCanvas" width="256" height="100" aria-label="256x100 黑白直方图"></canvas>
        </div>
        <div class="stats-grid" aria-label="统计结果">
          <div>
            <span>灰度 bins</span>
            <strong id="binCountText">256</strong>
          </div>
          <div>
            <span>最大计数</span>
            <strong id="maxCountText">--</strong>
          </div>
          <div>
            <span>像素总数</span>
            <strong id="pixelCountText">--</strong>
          </div>
        </div>
      </div>
    </section>

    <p id="statusText" class="status" role="status" aria-live="polite">Baseline 对照版：等待选择图片</p>

    <canvas id="sourceCanvas" hidden></canvas>
  </main>
  <script src="baseline-app.js"></script>
</body>
</html>
