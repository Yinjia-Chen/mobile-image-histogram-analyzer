<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>移动端图像直方图分析系统</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f8fa;
      color: #17202a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f7f8fa;
    }

    main {
      width: min(100%, 720px);
      margin: 0 auto;
      padding: 32px 20px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.25;
    }

    p {
      margin: 0 0 16px;
      font-size: 15px;
      line-height: 1.7;
      color: #4b5563;
    }

    .status {
      margin-top: 24px;
      padding: 14px 16px;
      border: 1px solid #d6dbe1;
      border-radius: 8px;
      background: #ffffff;
      color: #0f5132;
      font-size: 14px;
      line-height: 1.6;
    }

    .meta {
      margin-top: 24px;
      display: grid;
      gap: 8px;
      font-size: 13px;
      color: #687382;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #111827;
    }
  </style>
</head>
<body>
  <main>
    <h1>移动端图像直方图分析系统</h1>
    <p>Android WebView 已加载本地 H5 页面。当前阶段用于验证 APK 壳层和离线资源加载。</p>
    <p>后续阶段将继续加入图片选择、Canvas 像素读取、灰度统计、直方图绘制和耗时展示。</p>

    <section class="status" aria-live="polite">
      本地页面加载成功：<code>file:///android_asset/index.html</code>
    </section>

    <section class="meta" aria-label="阶段信息">
      <span>阶段：第 1 阶段，Android WebView 最小 APK</span>
      <span>范围：T-10 Android 项目骨架，T-11 WebView 本地页面加载</span>
    </section>
  </main>
</body>
</html>
