<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>移动端图像直方图分析系统</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Offline H5 Canvas</p>
        <h1>移动端图像直方图分析系统</h1>
      </div>
      <label class="choose-button" for="imageInput">
        <span aria-hidden="true">+</span>
        <span>选择图片</span>
      </label>
      <input id="imageInput" type="file" accept="image/*">
    </header>

    <section class="workspace" aria-label="图像直方图分析工作区">
      <div class="preview-pane">
        <div class="pane-header">
          <h2>原图预览</h2>
          <span id="imageMeta">未选择图片</span>
        </div>
        <div class="preview-stage">
          <img id="previewImage" alt="已选择图片预览">
          <p id="previewPlaceholder">选择一张本地图片后显示预览</p>
        </div>
      </div>

      <div class="result-pane">
        <div class="pane-header">
          <h2>直方图</h2>
          <span id="elapsedText">耗时 -- ms</span>
        </div>
        <div class="histogram-stage">
          <canvas id="histogramCanvas" width="256" height="100" aria-label="256x100 黑白直方图"></canvas>
        </div>
        <div class="stats-grid" aria-label="统计结果">
          <div>
            <span>灰度 bins</span>
            <strong id="binCountText">256</strong>
          </div>
          <div>
            <span>最大计数</span>
            <strong id="maxCountText">--</strong>
          </div>
          <div>
            <span>像素总数</span>
            <strong id="pixelCountText">--</strong>
          </div>
        </div>
      </div>
    </section>

    <p id="statusText" class="status" role="status" aria-live="polite">等待选择图片</p>

    <canvas id="sourceCanvas" hidden></canvas>
  </main>
  <script src="app.js"></script>
</body>
</html>
